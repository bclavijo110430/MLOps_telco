mlflow:
  image:
    repository: ghcr.io/mlflow/mlflow
    tag: v2.15.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
    hosts:
      - host: mlflow.bclavijo.xyz
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: mlflow-tls
    #    hosts:
    #      - mlflow.bclavijo.xyz
  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

postgresql:
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  db: mlflow_db
  user: mlflow_user
  # It is highly recommended to manage secrets via an external tool (e.g. ExternalSecrets)
  # Leave this empty to use the auto-generated generic secret or provide the name of an existing secret.
  existingSecret: ""
  password: "changeit" 
