apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mlflow.fullname" . }}-postgresql
  labels:
    app.kubernetes.io/name: {{ include "mlflow.name" . }}-postgresql
spec:
  serviceName: {{ include "mlflow.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mlflow.name" . }}-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mlflow.name" . }}-postgresql
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.db | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-db-credentials" (include "mlflow.fullname" .)) .Values.postgresql.existingSecret }}
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgresql
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes:
          - {{ .Values.postgresql.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
        {{- if .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ .Values.postgresql.persistence.storageClass }}
        {{- end }}
