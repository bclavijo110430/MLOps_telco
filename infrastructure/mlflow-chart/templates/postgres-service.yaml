apiVersion: v1
kind: Service
metadata:
  name: {{ include "mlflow.fullname" . }}-postgresql
  labels:
    app.kubernetes.io/name: {{ include "mlflow.name" . }}-postgresql
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    app.kubernetes.io/name: {{ include "mlflow.name" . }}-postgresql
