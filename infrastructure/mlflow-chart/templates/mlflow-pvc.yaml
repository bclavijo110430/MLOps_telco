{{- if .Values.mlflow.persistence.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mlflow.fullname" . }}-artifacts
  labels:
    app.kubernetes.io/name: {{ include "mlflow.name" . }}
spec:
  accessModes:
    - {{ .Values.mlflow.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.mlflow.persistence.size }}
  {{- if .Values.mlflow.persistence.storageClass }}
  storageClassName: {{ .Values.mlflow.persistence.storageClass }}
  {{- end }}
{{- end }}
