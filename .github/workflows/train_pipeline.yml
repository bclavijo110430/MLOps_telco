name: Train Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-pipeline:
    name: Run Training Pipeline
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'


      - name: Run Training Pipeline
        run: |
          chmod +x ./run_pipeline.sh
          ./run_pipeline.sh

      
      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image for Serving
        run: |
          docker build -f docker/Dockerfile.serving -t ${{ vars.DOCKERHUB_USERNAME }}/mlopstelcoserving:latest .
          docker push ${{ vars.DOCKERHUB_USERNAME }}/mlopstelcoserving:latest
